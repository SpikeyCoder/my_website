<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Page Not Found | Armstrong HoldCo LLC</title>
    <meta name="description" content="The page you requested could not be found." />
    <script>
      (function () {
        var path = window.location.pathname || "/";
        var basePath = path.indexOf("/my_website/") === 0 ? "/my_website" : "";
        var relativePath = basePath && path.indexOf(basePath) === 0 ? path.slice(basePath.length) || "/" : path;
        var match = relativePath.match(/^\/blog\/([^/?#]+)\/?$/i);

        if (match && match[1]) {
          var rawSlug = match[1];
          var slug = rawSlug;
          try {
            slug = decodeURIComponent(rawSlug);
          } catch (_error) {
            slug = rawSlug;
          }

          var target = basePath + "/blog/?slug=" + encodeURIComponent(slug) + "&from=path";
          window.location.replace(target);
        }
      })();
    </script>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0a1221; color: #d9e3f0; }
      .card { padding: 24px; border: 1px solid #29415f; border-radius: 12px; max-width: 520px; text-align: center; background: rgba(10,18,33,0.85); }
      a { color: #67e08a; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Page Not Found</h1>
      <p>We couldn't find that URL.</p>
      <p><a href="/">Return home</a></p>
    </div>
  </body>
</html>
